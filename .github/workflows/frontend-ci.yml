name: Frontend CI/CD

on:
  push:
    branches: [ "main" ]
    paths:
      - 'frontend/**'

# Cấp quyền cho GitHub Actions được phép ghi đè lên server GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  validate-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Kiểm tra lỗi cú pháp HTML
        run: npx htmlhint frontend/index.html

  # JOB MỚI: Tự động Deploy lên GitHub Pages SAU KHI test thành công
  deploy-frontend:
    needs: validate-frontend # Bắt buộc job test phải xanh mới chạy job này
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Đóng gói thư mục frontend
        uses: actions/upload-pages-artifact@v3
        with:
          path: './frontend' # Chỉ lấy thư mục FE để host
      - name: Deploy lên GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4