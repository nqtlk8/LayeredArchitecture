name: Frontend CI

on:
  push:
    branches: [ "main" ]
    paths:
      - 'frontend/**' # Chỉ kích hoạt khi thư mục frontend có thay đổi

jobs:
  validate-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js (để chạy linter)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Kiểm tra lỗi cú pháp HTML (Test)
        # Tải nhanh htmlhint và quét file index.html mà không cần file package.json
        run: npx htmlhint frontend/index.html